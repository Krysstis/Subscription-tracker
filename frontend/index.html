<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <h1>Subscription Tracker</h1>

        <div>
            <button onclick="showTab('login')" data-i18n="login">Prisijungti</button>
            <button onclick="showTab('register')" data-i18n="register">Registruotis</button>
            <button onclick="setLang('lt')">LT</button>
            <button onclick="setLang('en')">EN</button>
        </div>

        <hr>

        <div id="error-msg" class="hidden">
            <p id="error-text"></p>
        </div>

        <form id="login-form">
            <h2 data-i18n="login">Prisijungti</h2>
            <div>
                <label for="email" data-i18n="email">El. paštas:</label><br>
                <input type="email" id="email" required>
            </div>
            <br>
            <div>
                <label for="password" data-i18n="password">Slaptažodis:</label><br>
                <input type="password" id="password" required>
            </div>
            <br>
            <button type="submit" data-i18n="login">Prisijungti</button>
        </form>

        <form id="register-form" class="hidden">
            <h2 data-i18n="register">Registruotis</h2>
            <div>
                <label for="reg-email" data-i18n="email">El. paštas:</label><br>
                <input type="email" id="reg-email" required>
            </div>
            <br>
            <div>
                <label for="reg-password" data-i18n="password">Slaptažodis:</label><br>
                <input type="password" id="reg-password" required minlength="6">
            </div>
            <br>
            <button type="submit" data-i18n="register">Registruotis</button>
        </form>
    </div>

    <script src="js/translations.js"></script>
    <script src="js/language.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function showTab(tab) {
            document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
            document.getElementById('error-msg').classList.add('hidden');
        }

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            try {
                const data = await api.post('/auth/register', { email, password });
                localStorage.setItem('token', data.token);
                window.location.href = 'dashboard.html';
            } catch (err) {
                showError(err.data?.errors?.[0]?.msg || err.data?.error || 'Klaida');
            }
        });
    </script>
</body>
</html>
