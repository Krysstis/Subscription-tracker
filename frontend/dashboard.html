<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Tracker - Suvestinė</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div>
        <h1>Subscription Tracker</h1>
        <button onclick="setLang('lt')">LT</button>
        <button onclick="setLang('en')">EN</button>
        <button onclick="logout()" data-i18n="logout">Atsijungti</button>
        <a href="subscription-form.html"><button data-i18n="addSubscription">Pridėti prenumeratą</button></a>
    </div>

    <hr>

    <div id="stats-section">
        <h2 data-i18n="mySubscriptions">Mano prenumeratos</h2>
        <p><span data-i18n="activeSubscriptions">Aktyvios prenumeratos</span>: <strong id="stat-active">-</strong></p>
        <p><span data-i18n="totalMonthly">Mėnesio kaštai</span>: <strong id="stat-monthly">-</strong> EUR</p>
    </div>

    <hr>

    <div id="upcoming-section">
        <h2 data-i18n="upcomingPayments">Artėjantys mokėjimai</h2>
        <ul id="upcoming-list"></ul>
    </div>

    <hr>

    <div id="subscriptions-section">
        <h2 data-i18n="mySubscriptions">Mano prenumeratos</h2>

        <div>
            <label data-i18n="category">Kategorija</label>:
            <select id="filter-category" onchange="loadSubscriptions()">
                <option value="" data-i18n="allCategories">Visos kategorijos</option>
                <option value="Streaming">Streaming</option>
                <option value="Music">Music</option>
                <option value="Productivity">Productivity</option>
                <option value="Gaming">Gaming</option>
                <option value="Fitness">Fitness</option>
                <option value="Other">Other</option>
            </select>

            <label data-i18n="active">Aktyvios</label>:
            <select id="filter-active" onchange="loadSubscriptions()">
                <option value="" data-i18n="all">Visos</option>
                <option value="true" data-i18n="active">Aktyvios</option>
                <option value="false" data-i18n="inactive">Sustabdytos</option>
            </select>

            <label data-i18n="billingCycle">Rikiuoti</label>:
            <select id="filter-sort" onchange="loadSubscriptions()">
                <option value="">-</option>
                <option value="name" data-i18n="name">Pavadinimas</option>
                <option value="price" data-i18n="price">Kaina</option>
                <option value="next_payment_date" data-i18n="nextPayment">Kitas mokėjimas</option>
            </select>
        </div>

        <br>
        <div id="subscriptions-list"></div>
    </div>

    <div id="msg"></div>

    <script src="js/translations.js"></script>
    <script src="js/language.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
